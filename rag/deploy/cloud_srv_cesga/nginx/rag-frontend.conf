server {
    listen 80;
    server_name rag-front.example.cesga.es;

    root /var/www/rag-frontend;
    index index.html;

    location /static/ {
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri /index.html;
    }
}
